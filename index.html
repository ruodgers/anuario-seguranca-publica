<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrossel Anuário - Segurança Pública AM</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 0 20px; 
      font-family: 'Roboto', sans-serif;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      width: 100%;
      max-width: 1200px;
    }

    .header-text {
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 1.2;
    }

    .header-text span {
      font-size: 14px;
      font-weight: 400;
    }

    .header-btn {
      background-color: #FFFFFF;
      color: #00adef;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      line-height: 1.2;
      transition: background-color 0.2s, transform 0.1s;
    }

    .header-btn:hover {
      background-color: #f0f0f0;
    }
    
    .header-btn:active {
      transform: scale(0.98);
    }

    .container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .swiper {
      width: 100%;
      max-width: 1200px;
      height: 360px; /* Altura mantida */
      padding-bottom: 10px;
    }

    .swiper-slide {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden; 
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      background-color: #ffffff; /* Fundo branco para uniformizar imagens com alturas diferentes */
    }

    .swiper-slide img {
      width: 100%;
      height: 100%; 
      
      /* MUDANÇA PRINCIPAL AQUI: 'contain' garante que a imagem fique INTEIRA dentro do slide, sem cortes */
      object-fit: contain; 
      
      object-position: center; 
      transition: transform 0.3s ease;
    }
    
    .swiper-slide:hover img {
      transform: scale(1.05); /* Mantém o efeito de zoom */
    }

    .swiper-button-next,
    .swiper-button-prev {
      color: #1f3158;
      background: rgba(255,255,255,0.9);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      top: 50%;
      transform: translateY(-50%);
    }
    
    .swiper-button-prev { left: -20px; }
    .swiper-button-next { right: -20px; }

    .swiper-button-next::after,
    .swiper-button-prev::after {
      font-size: 16px;
      font-weight: 700;
    }
    
    @media (max-width: 768px) {
      .swiper-button-next, .swiper-button-prev {
        display: none;
      }
      body { padding: 0 10px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-text">
      INFOGRÁFICO ANUÁRIO<br>
      <span>DADOS 2025</span>
    </div>
    <a href="https://github.com/ruodgers/anuario-seguranca-publica/raw/main/assets/docs/Infograficos_Anuario_SegPub_2026.pdf" 
       target="_blank" 
       download="Infograficos_Anuario_SegPub_2026.pdf" 
       class="header-btn">
      Baixar infográfico completo <span>&#10095;</span>
    </a>
  </div>

  <div class="swiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide"><img src="assets/images/categorias.png" alt="Dados por Categorias"></div>
      <div class="swiper-slide"><img src="assets/images/drogas.png" alt="Dados de Drogas"></div>
      <div class="swiper-slide"><img src="assets/images/feminicidio.png" alt="Dados de Feminicídio"></div>
      <div class="swiper-slide"><img src="assets/images/homicidios.png" alt="Dados de Homicídios"></div>
      <div class="swiper-slide"><img src="assets/images/homicidios_2.png" alt="Dados Adicionais de Homicídios"></div>
      <div class="swiper-slide"><img src="assets/images/patrimonio.png" alt="Dados de Patrimônio"></div>
      </div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-button-next"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
  const swiper = new Swiper('.swiper', {
    spaceBetween: 20, 
    loop: true, /* Mantido para rolagem infinita */
    autoplay: {
      delay: 5000,
      disableOnInteraction: false,
    },
    navigation: {
      nextEl: '.swiper-button-next',
      prevEl: '.swiper-button-prev',
    },
    breakpoints: {
      320: {
        slidesPerView: 1.2,
        spaceBetween: 10,
      },
      640: {
        slidesPerView: 2,
        spaceBetween: 15,
      },
      1024: {
        slidesPerView: 3, /* Mantido 3 slides por vez em desktop */
        spaceBetween: 20,
      }
    }
  });
</script>

</body>
</html>
