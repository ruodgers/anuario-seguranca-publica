<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrossel Anuário - Segurança Pública AM</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 0 50px;
      font-family: 'Roboto', sans-serif;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .header-text {
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 1.2;
    }

    .header-text span {
      font-size: 14px;
      font-weight: 400;
    }

    .header-btn {
      background-color: #FFFFFF;
      color: #00adef;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
      line-height: 1.2;
      transition: transform 0.2s;
    }

    .header-btn:hover {
      transform: scale(1.02);
    }

    .container {
      width: 100%;
    }

    .swiper {
      width: 100%;
      height: 350px;
    }

    .swiper-slide {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .swiper-slide img {
      width: 100%;
      height: 330px;
      object-fit: contain;
      border-radius: 6px;
      background: transparent;
      /* Drop-shadow cria sombra no contorno da imagem, ideal para fundos coloridos */
      filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.15));
    }

    .swiper-button-next,
    .swiper-button-prev {
      color: #1f3158;
      background: rgba(255,255,255,0.85);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .swiper-button-next::after,
    .swiper-button-prev::after {
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-text">
      INFOGRÁFICO ANUÁRIO<br>
      <span>DADOS 2025</span>
    </div>
    <a href="assets/docs/Infograficos_Anuario_2026.pdf" download="Infograficos_Anuario_2026.pdf" class="header-btn">
      Acessar infográfico completo <span>&#10095;</span>
    </a>
  </div>

  <div class="swiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide"><img src="assets/images/0red_cat.png" alt="Redução Criminalidade"></div>
      <div class="swiper-slide"><img src="assets/images/1rou_trans_cole.png" alt="Roubo Transporte Coletivo"></div>
      <div class="swiper-slide"><img src="assets/images/2homicidio.png" alt="Homicídios"></div>
      <div class="swiper-slide"><img src="assets/images/3feminicidio.png" alt="Feminicídio"></div>
      <div class="swiper-slide"><img src="assets/images/4apreen_armas.png" alt="Apreensão de Armas"></div>
      <div class="swiper-slide"><img src="assets/images/5apreen_drogas.png" alt="Apreensão de Drogas"></div>
    </div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-button-next"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
  const swiper = new Swiper('.swiper', {
    spaceBetween: 16,
    loop: true,
    autoplay: {
      delay: 4000,
      disableOnInteraction: false,
    },
    navigation: {
      nextEl: '.swiper-button-next',
      prevEl: '.swiper-button-prev',
    },
    /* Responsividade: ajusta a quantidade de slides conforme o tamanho da tela */
    breakpoints: {
      320: {
        slidesPerView: 1,
        slidesPerGroup: 1,
      },
      768: {
        slidesPerView: 2,
        slidesPerGroup: 2,
      },
      1024: {
        slidesPerView: 3,
        slidesPerGroup: 3,
      }
    }
  });
</script>

</body>
</html>
